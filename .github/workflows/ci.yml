name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install application and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install --group dev
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Type check
        run: mypy app
      - name: Test with coverage
        run: |
          coverage run -m pytest
          coverage report
      - name: Validate database migration
        run: DATABASE_URL=sqlite:///./migration-verify.db alembic upgrade head
      - name: Validate Docker build
        run: docker build -t highlevel-ai-lead-bridge .
      - name: Validate Docker runtime health check
        run: |
          docker run -d --name highlevel-ai-lead-bridge -e WEBHOOK_SHARED_SECRET=ci-secret highlevel-ai-lead-bridge
          for attempt in {1..20}; do
            status="$(docker inspect --format='{{.State.Health.Status}}' highlevel-ai-lead-bridge)"
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          docker logs highlevel-ai-lead-bridge
          exit 1
